<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donegal Explorer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest.json">
</head>
<body class="home-page">

  <main class="hero-content">
    
    <header class="home-header">
      <img src="./assets/logo.png" alt="Donegal Explorer Logo" class="app-logo home-logo">
      <div class="header-text-group">
        <h1>Donegal Explorer</h1>
        <p>Discover the Sights & Sounds of the Wilds</p>
      </div>
    </header>

    <div class="home-container">
      <div class="welcome-box">
        <h2>Welcome to the Wilds</h2>
        <p>Explore the unique sights and sounds along the cliffs, bogs, and glens of County Donegal.</p>
        <div class="button-stack">
          <a href="birds.html" class="start-btn">Listen to Bird Calls</a>
        </div>
      </div>
    </div>

  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log("Service Worker Failed", err));
    }
  </script>
</body>
</html>
